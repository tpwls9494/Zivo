name: Auto Update Docs
on:
  push:
    branches: [main]
    paths-ignore: ["CHANGELOG.md"]
jobs:
  notify-openclaw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Notify openclaw
        env:
          OPENCLAW_HOOK_TOKEN: ${{ secrets.OPENCLAW_HOOK_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          DIFF=$(git diff HEAD~1 HEAD --stat | head -10)
          curl -X POST http://211.188.52.91:18789/hooks/agent \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENCLAW_HOOK_TOKEN" \
            -d "{\"message\": \"[Zivo] 커밋: $COMMIT_MSG / 변경: $DIFF - update-changelog.sh Zivo \\\"$COMMIT_MSG\\\" \\\"$DIFF\\\" 실행하고 memory/projects/Zivo/progress.md 에 기록한 뒤 텔레그램으로 알려줘.\", \"session\": \"isolated\"}"
